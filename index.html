/* 1. 父容器：只负责定位置，不负责居中 */
/* 1. 父容器：保留 flex，给子元素一个正确的环境 */

    position: absolute;
    top: 36%;
    left: 0;
    width: 100%;
    height: 54%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. 中间容器：作为手牌的定位基准 */
#playerHand {
    width: 100%;
    max-width: 400px; /* 限制扇形最大宽度，防止超出 */
    height: 100%;
    position: relative;
    padding: 0 20px;
    box-sizing: border-box;

        .hand-row {
  position: absolute;
  width: 100%;
  height: 150px;
  /* 你已经有的代码不动，只加下面这一行 */
  transform: translateY(0);
}
/* 3. 手牌行：水平居中的正确写法 */
#playerHand .card {
    width: 94.6px;
    height: 148.5px;
    border-radius: 10px;
    border: 2px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    background-size: cover;
    background-position: center;
    background-color: #fff;
    
    /* 核心修改：全部叠在父容器的中点 */
    position: absolute;
    left: 50%;
    margin-left: -47.3px; /* 宽度的一半，确保中心对齐 */
    
    /* 旋转基点设为卡片下方较远的位置，产生大扇形效果 */
    transform-origin: center 200%; 
    transition: all 0.3s ease;
    z-index: 1;
}
        
#playerHand .card.playable { 
    cursor: pointer;
    box-shadow: 0 0 12px 4px #ffd76b;
    transform: scale(1.08);
    z-index: 1;
}

// ===================== 渲染手牌（两排扇形 + 居中） =====================
// 渲染手牌（两排分开、不重叠扇形）
function renderSingleRow(rowCards, container) {
    const count = rowCards.length;
    if (count === 0) return;

    // --- 配置扇形参数 ---
    const maxTotalSpread = 45; // 整个扇形展开的最大总角度
    const angleStep = count > 1 ? Math.min(12, maxTotalSpread / (count - 1)) : 0; 
    const startAngle = -((count - 1) * angleStep) / 2;

    rowCards.forEach((code, idx) => {
        let el = document.createElement("div");
        el.className = "card";
        el.id = `hand-card-${playerHand.indexOf(code)}`;
        el.style.backgroundImage = `url(images/${code}.png)`;
        el.onclick = () => playCard(playerHand.indexOf(code));

        // 计算当前卡片的角度
        const angle = startAngle + (idx * angleStep);
        
        // 记录角度供 CSS hover 使用
        el.style.setProperty('--card-angle', `${angle}deg`);
        
        // 应用旋转：先 translateX(-50%) 居中，再 rotate 旋转
        // 配合旋转基点 (transform-origin)，卡片会自动排列成弧形
        el.style.transform = `translateX(0) rotate(${angle}deg)`;
        
        // 同一行里，越靠右的牌 z-index 越高
        el.style.zIndex = idx;

        if (isPlayable(code)) {
            el.classList.add("playable");
        }
        container.appendChild(el);
    });
}

    box.appendChild(topContainer);
    box.appendChild(bottomContainer);
}
// ===================== 可出牌规则 =====================
function isPlayable(card) {
    if (!systemCard || !canPlay) return false;
    let isAllowed = card.includes('wild') || /^(red|yellow|green|blue)-\d+$/.test(card);
    if (!isAllowed) return false;
    if (systemCard === "wild4") return true;

    let sColor = getColor(systemCard);
    let sNum = getNumber(systemCard);
    let pColor = getColor(card);
    let pNum = getNumber(card);

    if (card.includes('wild')) return true;
    return sColor === pColor || sNum === pNum;
}

function getColor(c) {
    if (c.startsWith("red")) return "red";
    if (c.startsWith("yellow")) return "yellow";
    if (c.startsWith("green")) return "green";
    if (c.startsWith("blue")) return "blue";
    return "wild";
}

// ===================== 出牌动画（抬升 + 变速飞牌） =====================
function playCard(idx) {
    if (!canPlay) return;
    let card = playerHand[idx];
    if (!isPlayable(card)) return;

    const el = document.getElementById(`hand-card-${idx}`);
    const systemCardBox = document.getElementById("systemCard");
    const cardRect = el.getBoundingClientRect();
    const targetRect = systemCardBox.getBoundingClientRect();

    el.style.transition = "transform 0.2s ease-out, box-shadow 0.2s ease-out";
    el.style.transform = "translateY(-20px) scale(1.1)";
    el.style.boxShadow = "0 0 15px 5px #ffd76b";

    setTimeout(() => {
        const moveX = targetRect.left + targetRect.width/2 - (cardRect.left + cardRect.width/2);
        const moveY = targetRect.top - cardRect.top;

        el.style.transition = "transform 0.4s cubic-bezier(0.1,0.8,0.3,1), opacity 0.4s ease";
        el.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.2)`;
        el.style.opacity = "0.9";

        setTimeout(() => {
            systemCard = card;
            playerHand.splice(idx, 1);
            localStorage.setItem("playerHand", JSON.stringify(playerHand));
            canPlay = false;
            renderSystemCard();
            renderHand();
            checkWin();
        }, 400);
    }, 200);
}

// ===================== 系统出牌（限制 +2 +4） =====================
function systemPlayRandomCard() {
    let cnt = playerHand.length;
    let valid = unoDeck.filter(c => !c.includes('wild'));

    // 限制 draw2 数量
    if (systemDraw2Count < maxDraw2Limit) {
        if (cnt <= 10) {
            valid.push("yellow-draw2", "red-draw2", "green-draw2", "blue-draw2");
        }
    }

    // 👇 这里直接删掉 wild4，电脑永远不会出+4
    // if (cnt <= 8) {
    //     valid.push("wild4");
    // }

    // 核心逻辑：抽牌
    systemCard = valid[Math.floor(Math.random() * valid.length)];
    canPlay = true;
    renderSystemCard();
    renderHand();

    // 计数 + 抽牌
    if (systemCard.includes('draw2')) {
         playerDrawCards(2);
        systemDraw2Count++;
        const tipEl = document.getElementById("gameTip");
        if (tipEl) {
            tipEl.innerText = "捣蛋猫出没，你被加了两张牌";
        }
    }

    // 👇 这里也一起注释/删掉，防止万一
    // if (systemCard === "wild4") {
    //     playerDrawCards(4);
    // }
}

if (tipEl) {

// ===================== 抽牌（上限12张） =====================
function playerDrawCards(n) {
    let pool = unoDeck.filter(c => !c.includes('wild') && !c.includes('draw2') && c !== "wild4");
    for (let i=0; i<n; i++) {
        if (playerHand.length >=12) break;
        let r = Math.floor(Math.random() * pool.length);
        playerHand.push(pool[r]);
        pool.splice(r,1);
    }
    localStorage.setItem("playerHand", JSON.stringify(playerHand));
    renderHand();
}

// ===================== 背包 =====================
function renderBag() {
    let bag = JSON.parse(localStorage.getItem('bag') || '[]');
    let box = document.getElementById('bagList');
    box.innerHTML = '';
    bag.forEach(code => {
        const data = cardDetail[code];
        if (data) {
            box.innerHTML += `
            <div class="bag-item" onclick="openBagDetail('${data.bigImg}','${data.desc}')">
                <img src="${data.bigImg}"> 
            </div>`;
        }
    });
}
function addCardToBag(code) {
    let bag = JSON.parse(localStorage.getItem('bag') || '[]');
    if (!bag.includes(code)) {
        bag.push(code);
        localStorage.setItem('bag', JSON.stringify(bag));
    }
}

// ===================== NFC =====================
function isNfcUsed(code) {
    let used = JSON.parse(localStorage.getItem('nfcUsed') || '[]');
    return used.includes(code);
}
function markNfcUsed(code) {
    let used = JSON.parse(localStorage.getItem('nfcUsed') || '[]');
    if (!used.includes(code)) {
        used.push(code);
        localStorage.setItem('nfcUsed', JSON.stringify(used));
    }
}

function scanNfc(code) {
    code = code.toLowerCase().trim().replace("#", "");
    currentNfcCode = code;
    if (!localStorage.getItem("logined")) { pendingNfcCode = code; showPage("loginPage"); return; }
    if (!document.getElementById("gamePage").classList.contains("active")) { pendingNfcCode = code; showPage("gamePage"); return; }

    if (!isNaN(parseInt(code))) {
        if (isNfcUsed(code)) { alert("已经击过掌了，请寻找下一个爪印"); return; }
        markNfcUsed(code); systemPlayRandomCard(); return;
    }
    if (code.startsWith("b")) {
        if (isNfcUsed(code)) { alert("已经击过掌了，请寻找下一个爪印"); return; }
        markNfcUsed(code); systemPlaySpecifiedCard(code); return;
    }
    if (code.startsWith("a")) {
        if (isNfcUsed(code)) { openOwnedPopup(); return; }
        
        if (cardDetail[code]) { 
            markNfcUsed(code); 
            // 传入整个 code，让弹窗函数去查找 scanImg
            openImagePopup(code); 
        } else {
            alert("无效卡片");
        }
        return;
    }
    alert("无效NFC");
}
